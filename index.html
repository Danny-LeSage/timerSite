<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turn Timers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <p class="wake-status" data-wake-status aria-live="polite">Tap the page once to enable keep awake on supported devices.</p>
    <section class="timer-grid" aria-label="Player timers">
      <button class="timer-card active" data-player="Adam" type="button">
        <span class="player-name">Adam</span>
        <span class="player-time" data-time>00:00:00</span>
        <span class="player-turn" data-turn>Adam's turn</span>
      </button>

      <button class="timer-card" data-player="Danny" type="button">
        <span class="player-name">Danny</span>
        <span class="player-time" data-time>00:00:00</span>
        <span class="player-turn" data-turn>Danny's turn</span>
      </button>

      <button class="timer-card" data-player="Jeff" type="button">
        <span class="player-name">Jeff</span>
        <span class="player-time" data-time>00:00:00</span>
        <span class="player-turn" data-turn>Jeff's turn</span>
      </button>

      <button class="timer-card" data-player="Peter" type="button">
        <span class="player-name">Peter</span>
        <span class="player-time" data-time>00:00:00</span>
        <span class="player-turn" data-turn>Peter's turn</span>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
